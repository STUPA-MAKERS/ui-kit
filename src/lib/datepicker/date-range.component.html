<fieldset class="dr">
  @if (legend) {
    <legend class="p-0 mb-2 text-sm font-semibold text-text">{{ legend }}</legend>
  }
  <div class="flex items-end gap-3 flex-wrap">
    <div class="dr__field">
      <app-datepicker
        [id]="id + '-start'"
        [ariaLabel]="startLabel"
        [max]="end()"
        [ngModel]="start()"
        (ngModelChange)="onStart($event)"
      />
    </div>
    <span class="pb-3 text-muted" aria-hidden="true">–</span>
    <div class="dr__field">
      <app-datepicker
        [id]="id + '-end'"
        [ariaLabel]="endLabel"
        [min]="start()"
        [ngModel]="end()"
        (ngModelChange)="onEnd($event)"
      />
    </div>
  </div>
</fieldset>
