<section class="card" [class.card--interactive]="interactive">
  <header class="card__header">
    @if (heading) {
      @switch (headingLevel) {
        @case (2) {
          <h2 class="text-lg font-semibold">{{ heading }}</h2>
        }
        @case (4) {
          <h4 class="text-lg font-semibold">{{ heading }}</h4>
        }
        @default {
          <h3 class="text-lg font-semibold">{{ heading }}</h3>
        }
      }
    }
    <ng-content select="[card-header]" />
  </header>
  <div class="p-5"><ng-content /></div>
  <footer class="card__footer"><ng-content select="[card-footer]" /></footer>
</section>
