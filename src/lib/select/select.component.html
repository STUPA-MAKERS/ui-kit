<div class="flex flex-col gap-2">
  @if (label) {
    <label class="text-sm font-medium text-text" [for]="id">
      {{ label }}
      @if (required) {
        <span class="text-danger" aria-hidden="true">*</span>
      }
    </label>
  }
  <select
    class="sel__control"
    [id]="id"
    [disabled]="disabled()"
    [attr.aria-label]="!label && ariaLabel ? ariaLabel : null"
    [attr.aria-invalid]="error ? 'true' : null"
    [attr.aria-describedby]="describedBy"
    [attr.required]="required ? '' : null"
    (change)="onSelect($event)"
    (blur)="onTouched()"
  >
    <!-- Auswahl per [selected] je Option (nicht [value] am <select>): so greift sie
         auch, wenn die Optionen ASYNC nachgeladen werden (z. B. Protokollant-Roster).
         Ein [value] am <select> würde eine zum Setzzeitpunkt fehlende Option ignorieren
         und auf den Platzhalter zurückfallen (#select-async). -->
    @if (placeholder) {
      <option value="" [disabled]="required" [selected]="value() === ''">{{ placeholder }}</option>
    }
    @for (opt of options; track opt.value) {
      <option [value]="opt.value" [selected]="opt.value === value()" [disabled]="opt.disabled ?? false">{{ opt.label }}</option>
    }
  </select>
  @if (hint && !error) {
    <p class="text-xs text-muted" [id]="id + '-hint'">{{ hint }}</p>
  }
  @if (error) {
    <p class="text-xs text-danger" [id]="id + '-error'" role="alert">{{ error }}</p>
  }
</div>
